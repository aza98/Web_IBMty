<!DOCTYPE html>
<html lang="es">

<head>
    <script>
        (function() {
            var saved = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            var theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#00C0F6">
    <meta name="robots" content="noindex">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="IBMty">
    <link rel="apple-touch-icon" href="assets/icons/IBMty_Icon_180.png">
    <link rel="icon" href="assets/icons/IBMty_Icon_32.ico">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/main.css">
    <title>Sin conexión — IBMty</title>
    <style>
        .offline-wrap {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 1.25rem;
            padding: 2rem 1.5rem calc(2rem + env(safe-area-inset-bottom));
            font-family: var(--font-secondary, system-ui, sans-serif);
            color: var(--color-text-primary, #010C18);
            background: var(--color-bg, #fff);
        }
        .offline-logo { width: 96px; height: 96px; }
        .offline-title {
            font-family: var(--font-primary, inherit);
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
        }
        .offline-text {
            max-width: 22rem;
            margin: 0;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--color-text-secondary, #4a5568);
        }
        .offline-retry {
            margin-top: .5rem;
            padding: .65rem 1.5rem;
            font: inherit;
            font-weight: 600;
            color: #010C18;
            background: var(--brand-color, #00C0F6);
            border: none;
            border-radius: var(--radius-pill, 999px);
            cursor: pointer;
        }
    </style>
</head>

<body data-page="offline">
    <main class="offline-wrap">
        <img class="offline-logo" src="assets/icons/Logo_IBMty.png" width="192" height="192" alt="IBMty">
        <h1 class="offline-title">Estás sin conexión</h1>
        <p class="offline-text">No pudimos cargar esta página porque no hay conexión a internet. Revisa tu red e inténtalo de nuevo.</p>
        <button type="button" class="offline-retry" onclick="location.reload()">Reintentar</button>
    </main>
    <script>
        // Recargar automáticamente en cuanto vuelva la conexión.
        window.addEventListener('online', function() { location.reload(); });
    </script>
</body>

</html>
